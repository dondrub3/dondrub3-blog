baseURL = 'https://dondrub3.com/'
languageCode = 'zh-cn'
title = 'Dondrub3 | 3P实验室'
theme = 'PaperMod'

[params]
  description = "哲学 · 物理 · 心理学 | 量化交易与心智探索"
  keywords = ["哲学", "物理", "心理学", "量化交易", "交易心理", "AI", "心智科学"]
  author = "东周"
  
  # 主题设置
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  
  # 首页设置
  [params.homeInfoParams]
    Title = "欢迎来到 3P 实验室"
    Content = """
这里是东周的个人博客，专注于哲学(Philosophy)、物理(Physics)、心理学(Psychology)的交叉探索。

- 🧠 **交易心理**：行为金融与量化决策
- ⚛️ **物理思维**：复杂系统与市场规律  
- 🤔 **哲学追问**：存在、意义与价值

用科学的眼光看世界，用哲学的心智思考人生。
"""
  
  # 社交链接
  socialIcons = [
    { name = "github", url = "https://github.com/dondrub3" },
    { name = "rss", url = "https://dondrub3.com/index.xml" }
  ]
  
  # 评论系统（可选）
  # comments = true
  # commentsProvider = "utterances"
  # utterancesRepo = "dondrub3/dondrub3-blog"
  
  # 分析统计（可选）
  # googleAnalytics = "G-XXXXXXXXXX"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
    
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 2
    
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  
[markup]
  [markup.highlight]
    style = "github"
    
# 分页设置
[pagination]
  pagerSize = 10
