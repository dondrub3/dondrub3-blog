baseURL = 'https://dondrub3.com/'
languageCode = 'zh-cn'
title = 'Dondrub3 | 3P实验室'
theme = 'PaperMod'

# 构建设置
buildFuture = true  # 构建未来日期的文章

[params]
  description = "哲学 · 物理 · 心理学 | 量化交易与心智探索"
  keywords = ["哲学", "物理", "心理学", "量化交易", "交易心理", "AI", "心智科学"]
  author = "东周"
  image = "/images/og-image.jpg"
  
  # SEO优化
  [params.seo]
    twitter = "@dondrub3"
    opengraph = true
    schema = true
  
  # 主题设置
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  
  # 首页设置
  disableSpecial1stPost = true  # 禁用特殊的首页第一篇文章样式
  [params.homeInfoParams]
    Title = "欢迎来到 3P 实验室"
    Content = "这里是东周的个人博客，专注于哲学(Philosophy)、物理(Physics)、心理学(Psychology)的交叉探索。\n\n- 🧠 **交易心理**：行为金融与量化决策\n- ⚛️ **物理思维**：复杂系统与市场规律  \n- 🤔 **哲学追问**：存在、意义与价值\n\n用科学的眼光看世界，用哲学的心智思考人生。"
  
  # 社交链接
  socialIcons = [
    { name = "github", url = "https://github.com/dondrub3" },
    { name = "rss", url = "https://dondrub3.com/index.xml" }
  ]
  
  # 评论系统（可选）
  # comments = true
  # commentsProvider = "utterances"
  # utterancesRepo = "dondrub3/dondrub3-blog"
  
  # 分析统计（可选）
  # googleAnalytics = "G-XXXXXXXXXX"
  
  # 主要文章部分
  mainSections = ["posts"]

[menu]
  # 核心3P分类 - 直接展示在导航栏
  [[menu.main]]
    identifier = "trading-3p"
    name = "交易3P"
    url = "/categories/交易3P分析/"
    weight = 1
    
  [[menu.main]]
    identifier = "decision-3p"
    name = "决策3P"
    url = "/categories/决策3P分析/"
    weight = 2
    
  [[menu.main]]
    identifier = "philosophy"
    name = "哲学"
    url = "/categories/哲学/"
    weight = 3
    
  # 其他导航
  [[menu.main]]
    identifier = "posts"
    name = "全部文章"
    url = "/posts/"
    weight = 4
    
  [[menu.main]]
    identifier = "tags"
    name = "标签云"
    url = "/tags/"
    weight = 5
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 6

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      goat = false  # 禁用 Goat ascii 图表渲染，避免代码块被转为 SVG
  [markup.highlight]
    style = "github"
    
# 分页设置
[pagination]
  pagerSize = 3  # 首页每页显示3篇文章
